name: CI
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["*"]

jobs:
  macos_build:
    name: MacOS (${{ matrix.OS }})
    strategy:
      fail-fast: true
      matrix:
        OS: ["macos-15-intel", "macos-15"]
    runs-on: ${{ matrix.OS }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Build the binary
        run: sbt buildBinaryPlatformRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: out/release/*
          name: ${{ matrix.os }}-binaries
          if-no-files-found: error

  linux_build:
    name: Linux (${{ matrix.OS }})
    strategy:
      fail-fast: true
      matrix:
        OS: ["ubuntu-22.04", "ubuntu-22.04-arm"]
    runs-on: ${{ matrix.OS }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1

      - name: Build the binary
        run: sbt buildBinaryPlatformRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: out/release/*
          name: ${{ matrix.os }}-binaries
          if-no-files-found: error

  windows_build:
    name: Windows
    strategy:
      fail-fast: false
    runs-on: windows-2022
    env:
      LLVM_BIN: 'C:\Program Files\LLVM\bin'
      LLVM_VERSION: "20.1.8"
    steps:
      # This step is important to make sure scalafmt
      # checks don't fail
      - name: Setup git config
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1

      # See https://github.com/scala-native/scala-native/blob/master/.github/actions/windows-setup-env/action.yml#L14 SN_RELE
      # for details
      - name: Configure Pagefile
        uses: al-cheb/configure-pagefile-action@v1.2
        with:
          minimum-size: 4GB
          maximum-size: 16GB

      - name: Install clang and SBT
        shell: pwsh
        run: |
          choco install llvm --version="$Env:LLVM_VERSION" --allow-downgrade
          choco install sbt --version=1.12.4
          clang --version

      - name: Install libs
        shell: pwsh
        id: vcpkg
        run: vcpkg install bdwgc zlib --triplet=x64-windows-static

      - name: Resolve env variables
        id: resolve-env
        shell: pwsh
        run: |
          "ProgramFiles=${env:ProgramFiles}" >> $env:GITHUB_OUTPUT
          "LocalAppData=${env:LocalAppData}" >> $env:GITHUB_OUTPUT
          "UserProfile=${env:UserProfile}" >> $env:GITHUB_OUTPUT
          "VcpkgLibs=${env:VCPKG_INSTALLATION_ROOT}\installed\x64-windows-static" >> $env:GITHUB_OUTPUT

      - name: Build binary (windows)
        run: sbt buildBinaryPlatformRelease
        env:
          SCALANATIVE_INCLUDE_DIRS: ${{steps.resolve-env.outputs.VcpkgLibs}}\include
          SCALANATIVE_LIB_DIRS: ${{steps.resolve-env.outputs.VcpkgLibs}}\lib
        shell: cmd

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux_build, macos_build]
    name: Upload binaries to release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        id: download
        with:
          path: binaries

      - name: List downloaded binaries
        run: ls -R binaries

      - name: Upload release binaries
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "${{steps.download.outputs.download-path}}/**/*"

  mergify-build-checkpoint:
    runs-on: ubuntu-latest
    needs: [linux_build, windows_build, macos_build]
    steps:
      - name: I only exist to please Mergify :(
        run: echo "It's a sad existence but necessary"
